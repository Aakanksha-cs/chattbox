<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Friends Chat</title>
<script src="https://cdn.jsdelivr.net/npm/gun/gun.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat{
width:100%;
max-width:500px;
height:80vh;
background:#020617;
display:flex;
flex-direction:column;
border-radius:12px;
overflow:hidden;
}

.messages{
flex:1;
overflow:auto;
padding:15px;
}

.msg{
background:#111827;
padding:8px 12px;
border-radius:10px;
margin:5px 0;
width:fit-content;
max-width:70%;
}

.me{
background:#2563eb;
margin-left:auto;
}

.input{
display:flex;
border-top:1px solid #111827;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
background:#020617;
color:white;
}

button{
padding:12px 16px;
border:none;
background:#2563eb;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="chat">
<div class="messages" id="messages"></div>

<div class="input">
<input id="msg" placeholder="Type message..." />
<button onclick="send()">Send</button>
</div>
</div>

<script>
const gun = Gun();
const room = gun.get("friends-room"); // same room for everyone

const messages = document.getElementById("messages");
const input = document.getElementById("msg");

const id = Math.random().toString(36).slice(2);

room.map().on(data=>{
if(!data) return;

const div = document.createElement("div");
div.className="msg"+(data.id===id?" me":"");
div.textContent=data.text;

messages.appendChild(div);
messages.scrollTop=messages.scrollHeight;
});

function send(){
if(!input.value) return;

room.set({
text:input.value,
id:id,
time:Date.now()
});

input.value="";
}

input.addEventListener("keydown",e=>{
if(e.key==="Enter") send();
});
</script>

</body>
</html>
