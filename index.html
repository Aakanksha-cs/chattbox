<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Friends Chat</title>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:Inter;
background:linear-gradient(135deg,#0f172a,#020617);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}

.app{
width:800px;
height:550px;
background:#020617;
border-radius:18px;
display:flex;
flex-direction:column;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.header{
padding:15px;
border-bottom:1px solid #111827;
display:flex;
justify-content:space-between;
align-items:center;
}

.header button{
background:#2563eb;
border:none;
color:white;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.messages{
flex:1;
padding:20px;
overflow-y:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg{
padding:10px 14px;
border-radius:12px;
background:#111827;
max-width:60%;
width:fit-content;
}

.me{
background:#2563eb;
margin-left:auto;
}

.input{
display:flex;
padding:12px;
gap:10px;
border-top:1px solid #111827;
}

.input input{
flex:1;
padding:12px;
border-radius:10px;
border:none;
background:#111827;
color:white;
}

.input button{
padding:12px 16px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.empty{
opacity:.5;
text-align:center;
margin-top:40px;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
<div>💬 Friends Chat</div>
<button onclick="connectFriend()">Connect</button>
</div>

<div class="messages" id="messages">
<div class="empty">Click Connect to start chatting</div>
</div>

<div class="input">
<input id="msg" placeholder="Type message..." />
<button onclick="sendMsg()">Send</button>
</div>

</div>

<script>
// ✅ FIXED PEER CONFIG (IMPORTANT)
let peer = new Peer(undefined, {
  host: "peerjs.com",
  secure: true,
  port: 443,
  debug: 2
});

let conn;

const messages = document.getElementById("messages");
const msgInput = document.getElementById("msg");

// incoming connection
peer.on("connection", c => {
conn = c;

conn.on("open", () => {
addMsg("Friend connected ✔", false);
});

conn.on("data", data => {
addMsg(data, false);
});
});

function connectFriend(){
const id = prompt("Enter your friend's ID:");
if(!id) return;

conn = peer.connect(id);

conn.on("open", () => {
addMsg("Connected ✔", false);

conn.on("data", data => {
addMsg(data, false);
});
});

conn.on("error", err => {
alert("Connection failed ❌");
console.log(err);
});
}

function addMsg(text,me){
document.querySelector(".empty")?.remove();

let div = document.createElement("div");
div.className = "msg" + (me ? " me" : "");
div.textContent = text;

messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
}

function sendMsg(){
let text = msgInput.value.trim();
if(!text) return;

addMsg(text,true);

if(conn && conn.open){
conn.send(text);
} else {
alert("Not connected yet!");
}

msgInput.value="";
}

msgInput.addEventListener("keydown",(e)=>{
if(e.key==="Enter") sendMsg();
});
</script>

</body>
</html>
