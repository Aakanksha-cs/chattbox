<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Friends Chat</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Inter',sans-serif;
background:linear-gradient(135deg,#0f172a,#020617);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:white;
}
.app{
width:900px;
height:600px;
background:#020617;
border-radius:20px;
display:flex;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}
.sidebar{
width:260px;
background:#020617;
border-right:1px solid #111827;
display:flex;
flex-direction:column;
}
.logo{padding:18px;font-weight:600;font-size:18px;border-bottom:1px solid #111827;}
.userbox{padding:15px;border-bottom:1px solid #111827;font-size:13px;word-break:break-all}
.connect{padding:15px;display:flex;flex-direction:column;gap:8px}
.connect input{padding:10px;border-radius:10px;border:none;background:#111827;color:white}
.connect button{padding:10px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer}
.chat{flex:1;display:flex;flex-direction:column}
.header{padding:15px;border-bottom:1px solid #111827;font-weight:500}
.messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:14px;background:#111827;width:fit-content;max-width:60%}
.me{background:#2563eb;margin-left:auto}
.input{padding:15px;border-top:1px solid #111827;display:flex;gap:10px}
.input input{flex:1;padding:12px;border-radius:12px;border:none;background:#111827;color:white}
.input button{padding:12px 18px;border:none;border-radius:12px;background:#2563eb;color:white;font-weight:500;cursor:pointer}
.empty{opacity:.4;text-align:center;margin-top:40px;font-size:14px}
</style>
</head>
<body>

<div class="app">
<div class="sidebar">
<div class="logo">💬 Friends Chat</div>
<div class="userbox">Your ID:<br><b id="myId">loading...</b></div>
<div class="connect">
<input id="friendId" placeholder="Enter friend ID" />
<button id="connectBtn" type="button">Connect Friend</button>
</div>
</div>

<div class="chat">
<div class="header">Private Chat</div>
<div class="messages" id="messages">
<div class="empty">Connect a friend to start chatting</div>
</div>
<div class="input">
<input id="msg" placeholder="Type message and press Enter" />
<button id="sendBtn" type="button">Send</button>
</div>
</div>
</div>

<script>
let peer;
let conn;

const myIdEl = document.getElementById('myId');
const friendInput = document.getElementById('friendId');
const messages = document.getElementById('messages');
const msgInput = document.getElementById('msg');
const sendBtn = document.getElementById('sendBtn');
const connectBtn = document.getElementById('connectBtn');

function addMsg(text,me){
const empty = document.querySelector('.empty');
if(empty) empty.remove();

const div = document.createElement('div');
div.className = 'msg ' + (me ? 'me':'' );
div.textContent = text;
messages.appendChild(div);
messages.scrollTop = messages.scrollHeight;
}

function setupConnection(){
conn.on('data', data => addMsg(data,false));
}

function connectFriend(){
const id = friendInput.value.trim();
if(!id) return alert('Enter friend ID');
conn = peer.connect(id);
conn.on('open', setupConnection);
}

function sendMsg(){
const text = msgInput.value.trim();
if(!text) return;

addMsg(text,true);

if(conn && conn.open){
conn.send(text);
}

msgInput.value='';
}

// init peer
peer = new Peer();
peer.on('open', id => myIdEl.textContent = id);
peer.on('connection', c => { conn = c; setupConnection(); });

// events
sendBtn.onclick = sendMsg;
connectBtn.onclick = connectFriend;

msgInput.addEventListener('keydown', e => {
if(e.key === 'Enter'){
e.preventDefault();
sendMsg();
}
});

</script>
</body>
</html>
